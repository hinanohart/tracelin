name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy tracelin

  guards:
    # honest-marketing regression guard: fail if an over-claim or a fabricated
    # metric marker ever lands in the docs or the package.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: no over-claim phrases
        run: |
          if grep -rEniI "fully verif|guarantees? correctness|polynomial causal consistency|world.?s first" README.md NOTICE pyproject.toml tracelin/; then
            echo "::error::banned over-claim phrase found"; exit 1
          fi
      - name: no placeholder / fake metrics in package
        run: |
          if grep -rEniI "placeholder|dummy metric|lorem ipsum" tracelin/ README.md; then
            echo "::error::placeholder/fake-metric marker found"; exit 1
          fi

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest --cov=tracelin --cov-report=term-missing --cov-fail-under=85

  repro:
    # clean-clone reproduction of the documented quickstart (determinism gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .
      - run: bash examples/repro.sh
